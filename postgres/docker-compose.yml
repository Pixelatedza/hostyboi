services:
  db:
    image: postgres:17
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_USER=pgadmin
    secrets:
      - db_password
    networks:
      - postgres
    volumes:
      - /srv/storage/bulk/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pgadmin -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  postgres:
    external: true

secrets:
  db_password:
    file: ~/.secrets/postgres_root
