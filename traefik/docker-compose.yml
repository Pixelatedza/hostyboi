services:
  traefik:
    image: traefik:3.6
    container_name: traefik
    environment:
      - DO_AUTH_TOKEN_FILE=/run/secrets/do_token
    command:
      - "--log.level=DEBUG"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.websecure.address=:443"
      - "--ping"
      - "--entrypoints.traefik.address=:8080"
      - "--api.disabledashboardad=true"
      - "--certificatesresolvers.le.acme.dnschallenge=true"
      - "--certificatesresolvers.le.acme.dnschallenge.provider=digitalocean"
      - "--certificatesresolvers.le.acme.email=your-ekpoepol@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      # Optional: custom resolvers to speed up DNS propagation checks
      - "--certificatesresolvers.le.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    labels:
      - "traefik.enable=true"

      # 1. Dashboard Router (Secure the dashboard itself)
      - "traefik.http.routers.traefik-dash.rule=Host(`traefik.tisasillyplace.com`)"
      - "traefik.http.routers.traefik-dash.entrypoints=websecure"
      - "traefik.http.routers.traefik-dash.tls.certresolver=le"
      - "traefik.http.routers.traefik-dash.service=api@internal"
      - "traefik.http.routers.traefik-dash.middlewares=authentik-auth@docker"

      # 2. Authentik Middleware
      # Replace 'authentik-server' with the container name of your authentik server
      - "traefik.http.middlewares.authentik-auth.forwardauth.address=http://authentik:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik-auth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,Authorization"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/.do_token:/run/secrets/do_token:ro
      - ~/acme.json:/acme.json
    networks:
      - traefik
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  traefik:
    external: true
